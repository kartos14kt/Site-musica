<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Este é um site de exemplo">
    <meta name="keywords" content="cantores, musicas">
    <meta name="author" content="Murilo Cézar">
    <title>Meu sitezão</title>

    <style>
        body {
            margin: 0;
            background-color: rgb(0, 0, 0);
            height: 100vh; /* ocupa toda a altura da tela */
        }
        a {
            text-decoration: none;
            color: inherit; /* pega a cor do elemento pai */
        }
        div {
            
            margin: 0;
            background-color: transparent;
            box-sizing: border-box;
            border-radius: 15px;
        }
        div.active-bg {
            background-color: rgb(27, 27, 27);
        }
        .artistas {
            
            float: left;
            padding: 0;
            text-align: center;
            width: 30%; height: 80%;
            margin-top: 40px; margin-left: 5px;
        }
        .sobre {
            
            float: right;
            padding: 0;
            text-align: center;
            width: 68%; height: 80%;
            margin-top: 40px; margin-right: 5px;
        }
        iframe {
            background-color: rgb(92, 92, 92);
            width: 100%; height: 100%;
            border-radius: 14px;
        }
    </style>
</head>
<body>

    <div class="artistas">
    <iframe style="border: none;" src="artistas.html"  name="listaArtists" title="iframe dos artistas"></iframe> 
    </div>
    <div class="sobre">
    <iframe style="border: none;"  name="detalheArtist" id="detalheArtist"></iframe>
    </div>
</body>
</html>
