<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Este é um site de exemplo">
    <meta name="keywords" content="cantores, musicas">
    <meta name="author" content="Murilo Cézar">
    <title>Meu sitezão</title>

    <link rel="stylesheet" href="principal.css">
</head>
<body>

<div class="layout">
<!-- artistas-->
    <div class="coluna-esquerda">

        <div class="artistas">
            <h1 align="center">Artistas</h1>

            <div class="nomes" onclick="selecionarArtista(this)" data-artista="fabio">
                <p>Fabio</p>
            </div>

            <div class="nomes" onclick="selecionarArtista(this)" data-artista="joao">
                <p>João</p>
            </div>
        </div>

        <div class="extra">
            
            
            <!-- player de música -->
            <div class="player">
                
                <div class="top-player">
                    
                    <img src="capa.avif" class="capa">
                    
                </div>
                <div class="info">
                    <div class="titulo" id="titulo">Nenhuma música</div>
                    <div class="artista" id="artista">aaaaaaa</div>
                </div>
                
                <div class="barra">
                    <input type="range" value="0" min="0" max="100" class="progresso">
                </div>
                
                <div class="controles">
                    <button class="btn">⏮</button>
                    <button class="pause" id="play">⏯</button>
                    <button class="btn">⏭</button>
                </div>
                
                <audio id="audio"></audio>
            </div>
        </div>

    </div>



<!-- musicas e letras-->
    <div class="sobre">

        <div class="listM">
            aqui fica as musicas
        </div>

        <div class="letras">
            aqui fica as letras
        </div>
    </div>

</div>
    <script src="player.js"></script>
</body>
</html>
